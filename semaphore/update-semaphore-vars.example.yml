---
update_ansible: true
update_semaphore: true

# Adjust if pipx was installed for another user than root.
ansible_pipx_user: root

# Preferred: specify only the target Semaphore version.
semaphore_release_version: "2.16.99"

# Optional override: exact .deb URL. If set, this is used instead of semaphore_release_version.
semaphore_deb_url: ""

semaphore_service_name: semaphore
semaphore_ui_port: 3000
