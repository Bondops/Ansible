---
- name: Update Semaphore UI package
  hosts: localhost
  gather_facts: false
  vars:
    semaphore_binary_path: /usr/bin/semaphore
    semaphore_deb_tmp_path: /tmp/semaphore_update.deb
    semaphore_ui_port: 3000
    semaphore_backup_dir: /var/backups/semaphore
    semaphore_release_api_url: https://api.github.com/repos/semaphoreui/semaphore/releases/latest

  pre_tasks:
    - name: Detect effective execution user
      ansible.builtin.command: id -un
      register: execution_user_cmd
      changed_when: false
      check_mode: false

    - name: Check passwordless sudo when not running as root
      ansible.builtin.command: sudo -n true
      register: sudo_check_cmd
      changed_when: false
      failed_when: false
      check_mode: false
      when: (execution_user_cmd.stdout | trim) != 'root'

    - name: Require root or passwordless sudo on localhost
      ansible.builtin.assert:
        that:
          - (execution_user_cmd.stdout | trim) == 'root' or sudo_check_cmd.rc == 0
        fail_msg: >-
          This playbook requires direct root or passwordless sudo.
          Current execution user is {{ execution_user_cmd.stdout | trim }}.

    - name: Detect Semaphore service unit file path
      ansible.builtin.command: systemctl show semaphore --property=FragmentPath --value
      register: semaphore_fragment_path_cmd
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Detect Semaphore ExecStart command
      ansible.builtin.command: systemctl show semaphore --property=ExecStart --value
      register: semaphore_execstart_cmd
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Resolve Semaphore config and service file paths
      ansible.builtin.set_fact:
        execution_user: "{{ execution_user_cmd.stdout | trim }}"
        semaphore_config_path: >-
          {{
            (semaphore_execstart_cmd.stdout | regex_search('--config[= ]([^ ;]+)', '\1') | first | default(''))
          }}
        semaphore_service_unit_path: "{{ semaphore_fragment_path_cmd.stdout | trim }}"

    - name: Require detectable Semaphore config path
      ansible.builtin.assert:
        that:
          - semaphore_config_path | length > 0
        fail_msg: "Could not detect Semaphore config path from systemd ExecStart."

    - name: Read installed Semaphore version before update
      ansible.builtin.command:
        argv:
          - "{{ semaphore_binary_path }}"
          - version
      register: semaphore_version_before_cmd
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Read Semaphore config JSON
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - cat
          - "{{ semaphore_config_path }}"
      register: semaphore_config_cat_cmd
      changed_when: false
      check_mode: false

    - name: Resolve Semaphore database path
      ansible.builtin.set_fact:
        semaphore_db_path: >-
          {{
            (
              (semaphore_config_cat_cmd.stdout | from_json).db
              if ((semaphore_config_cat_cmd.stdout | from_json).db is defined and ((semaphore_config_cat_cmd.stdout | from_json).db is string))
              else
              (
                (semaphore_config_cat_cmd.stdout | from_json).bolt.path
                if ((semaphore_config_cat_cmd.stdout | from_json).bolt is defined and (semaphore_config_cat_cmd.stdout | from_json).bolt.path is defined)
                else '/var/lib/semaphore/semaphore.db'
              )
            )
          }}

    - name: Read latest Semaphore release from GitHub
      ansible.builtin.uri:
        url: "{{ semaphore_release_api_url }}"
        method: GET
        return_content: true
        headers:
          Accept: application/vnd.github+json
          X-GitHub-Api-Version: "2022-11-28"
      register: semaphore_release_api_response
      check_mode: false

    - name: Resolve target Semaphore release asset
      ansible.builtin.set_fact:
        semaphore_target_asset_name: >-
          {% set ns = namespace(value='') %}
          {% for asset in (semaphore_release_api_response.json.assets | default([])) %}
          {% if (asset.name | default('')).startswith('semaphore_') and 'linux_amd64.deb' in (asset.name | default('')) and ns.value == '' %}
          {% set ns.value = asset.name %}
          {% endif %}
          {% endfor %}
          {{ ns.value | trim }}
        semaphore_target_asset_url: >-
          {% set ns = namespace(value='') %}
          {% for asset in (semaphore_release_api_response.json.assets | default([])) %}
          {% if (asset.name | default('')).startswith('semaphore_') and 'linux_amd64.deb' in (asset.name | default('')) and ns.value == '' %}
          {% set ns.value = asset.browser_download_url | default('') %}
          {% endif %}
          {% endfor %}
          {{ ns.value | trim }}

    - name: Resolve installed and target Semaphore versions
      ansible.builtin.set_fact:
        semaphore_installed_version: >-
          {{
            (semaphore_version_before_cmd.stdout | default('') | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+'))
            | default('', true)
            | trim
          }}
        semaphore_target_version: >-
          {{
            ((semaphore_target_asset_name | trim).split('_'))[1]
            if (
              (semaphore_target_asset_name | trim | length > 0)
              and
              ((semaphore_target_asset_name | trim).split('_') | length > 1)
            )
            else ''
          | trim }}

    - name: Resolve target Semaphore package URL
      ansible.builtin.set_fact:
        semaphore_target_deb_url: "{{ semaphore_target_asset_url | default('', true) | trim }}"

    - name: Debug available Semaphore release assets when detection fails
      ansible.builtin.debug:
        msg: "{{ semaphore_release_api_response.json.assets | default([]) | map(attribute='name') | list }}"
      when:
        - (semaphore_target_deb_url | default('', true) | length == 0) or (semaphore_target_version | default('', true) | length == 0)

    - name: Require detectable Semaphore release asset and version
      ansible.builtin.assert:
        that:
          - semaphore_target_deb_url | default('', true) | length > 0
          - semaphore_target_version | default('', true) | length > 0
        fail_msg: "Could not detect latest Semaphore linux_amd64.deb release from GitHub."

    - name: Determine whether Semaphore update is needed
      ansible.builtin.set_fact:
        semaphore_update_needed: >-
          {{
            (semaphore_installed_version | default('', true) | trim)
            !=
            (semaphore_target_version | default('', true) | trim)
          }}

    - name: Ensure Semaphore backup directory exists
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - install
          - -d
          - -m
          - "0755"
          - "{{ semaphore_backup_dir }}"
      changed_when: true
      when:
        - not ansible_check_mode
        - semaphore_update_needed

    - name: Check Semaphore files for backup
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ semaphore_config_path }}"
        - "{{ semaphore_db_path }}"
        - "{{ semaphore_service_unit_path }}"
      register: semaphore_backup_stats

    - name: Backup Semaphore files before update
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - cp
          - -a
          - "{{ item.stat.path }}"
          - "{{ semaphore_backup_dir }}/{{ item.stat.path | basename }}.{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}.bak"
      loop: "{{ semaphore_backup_stats.results }}"
      changed_when: true
      when:
        - not ansible_check_mode
        - semaphore_update_needed
        - item.stat.exists

    - name: Inform when requested Semaphore version is already installed
      ansible.builtin.debug:
        msg: "Semaphore {{ semaphore_installed_version }} is already installed. Package install will be skipped."
      when:
        - not semaphore_update_needed

    - name: Inform what would happen in check mode
      ansible.builtin.debug:
        msg:
          - "Check mode: no package changes will be applied."
          - "Installed Semaphore version: {{ semaphore_installed_version }}"
          - "Target Semaphore version: {{ semaphore_target_version }}"
          - "Target package URL: {{ semaphore_target_deb_url }}"
      when:
        - ansible_check_mode
        - semaphore_update_needed

  tasks:
    - name: Ensure base packages required for Semaphore update are installed
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - apt-get
          - update
      changed_when: true
      when:
        - not ansible_check_mode
        - semaphore_update_needed

    - name: Ensure ca-certificates package is installed
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - apt-get
          - install
          - -y
          - ca-certificates
      changed_when: true
      when:
        - not ansible_check_mode
        - semaphore_update_needed

    - name: Download requested Semaphore release package
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - wget
          - -O
          - "{{ semaphore_deb_tmp_path }}"
          - "{{ semaphore_target_deb_url }}"
      changed_when: true
      when:
        - not ansible_check_mode
        - semaphore_update_needed

    - name: Install requested Semaphore release package
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - apt-get
          - install
          - -y
          - "{{ semaphore_deb_tmp_path }}"
      register: semaphore_install
      changed_when: true
      when:
        - not ansible_check_mode
        - semaphore_update_needed

    - name: Restart Semaphore service after package install
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - bash
          - -lc
          - "nohup sh -c 'sleep 2 && systemctl restart semaphore' >/dev/null 2>&1 &"
      changed_when: true
      when:
        - not ansible_check_mode
        - semaphore_update_needed

    - name: Inform about deferred Semaphore restart
      ansible.builtin.debug:
        msg: "Semaphore restart scheduled in 2 seconds."
      when:
        - not ansible_check_mode
        - semaphore_update_needed

    - name: Read installed Semaphore version
      ansible.builtin.command:
        argv:
          - "{{ semaphore_binary_path }}"
          - version
      register: semaphore_version_cmd
      changed_when: false
      check_mode: false

    - name: Output Semaphore update summary
      ansible.builtin.debug:
        msg:
          - "Execution user: {{ execution_user }}"
          - "Detected Semaphore config: {{ semaphore_config_path }}"
          - "{{ (semaphore_version_cmd.stdout_lines | default(['Semaphore version unknown']))[0] }}"
          - "Semaphore target version: {{ semaphore_target_version }}"
          - "Semaphore backups: {{ semaphore_backup_dir }}"
          - "Semaphore update needed: {{ semaphore_update_needed }}"
          - "Check mode: {{ ansible_check_mode }}"
