---
- name: Update Ansible installed in Python venv
  hosts: localhost
  gather_facts: false
  vars:
    ansible_python_package: ansible

  pre_tasks:
    - name: Detect effective execution user
      ansible.builtin.command: id -un
      register: execution_user_cmd
      changed_when: false
      check_mode: false

    - name: Detect ansible executable in PATH
      ansible.builtin.shell: command -v ansible
      args:
        executable: /bin/bash
      register: ansible_binary_path_cmd
      changed_when: false
      check_mode: false

    - name: Require ansible executable in PATH
      ansible.builtin.assert:
        that:
          - ansible_binary_path_cmd.rc == 0
          - ansible_binary_path_cmd.stdout | trim | length > 0
        fail_msg: "ansible executable was not found in PATH for the current user."

    - name: Detect ansible executable owner
      ansible.builtin.stat:
        path: "{{ ansible_binary_path_cmd.stdout | trim }}"
        follow: true
      register: ansible_binary_stat

    - name: Resolve ansible, pip, and venv paths
      ansible.builtin.set_fact:
        execution_user: "{{ execution_user_cmd.stdout | trim }}"
        ansible_binary_path: "{{ ansible_binary_path_cmd.stdout | trim }}"
        ansible_binary_owner: "{{ ansible_binary_stat.stat.pw_name }}"
        ansible_bin_dir: "{{ (ansible_binary_path_cmd.stdout | trim) | dirname }}"
        ansible_pip_executable: "{{ ((ansible_binary_path_cmd.stdout | trim) | dirname) ~ '/pip' }}"
        ansible_venv_path: "{{ (((ansible_binary_path_cmd.stdout | trim) | dirname) | dirname) }}"

    - name: Check passwordless sudo access to ansible owner when needed
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - -u
          - "{{ ansible_binary_owner }}"
          - "true"
      register: ansible_owner_sudo_check
      changed_when: false
      failed_when: false
      check_mode: false
      when: execution_user != ansible_binary_owner

    - name: Debug sudo access to ansible owner when needed
      ansible.builtin.debug:
        msg:
          - "sudo rc: {{ ansible_owner_sudo_check.rc | default('unset') }}"
          - "sudo stdout: {{ ansible_owner_sudo_check.stdout | default('') }}"
          - "sudo stderr: {{ ansible_owner_sudo_check.stderr | default('') }}"
      when: execution_user != ansible_binary_owner

    - name: Require direct owner execution or passwordless sudo to ansible owner
      ansible.builtin.assert:
        that:
          - execution_user == ansible_binary_owner or ansible_owner_sudo_check.rc == 0
        fail_msg: >-
          This playbook must run as the owner of the ansible virtual environment,
          or have passwordless sudo to that user.
          Execution user is {{ execution_user }}, ansible owner is {{ ansible_binary_owner }}.

    - name: Require detected pip executable
      ansible.builtin.stat:
        path: "{{ ansible_pip_executable }}"
      register: ansible_pip_stat

    - name: Fail when pip executable next to ansible is missing
      ansible.builtin.assert:
        that:
          - ansible_pip_stat.stat.exists
        fail_msg: "Could not find pip next to ansible at {{ ansible_pip_executable }}."

  tasks:
    - name: Upgrade pip in Ansible venv
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - -u
          - "{{ ansible_binary_owner }}"
          - "{{ ansible_pip_executable }}"
          - install
          - -U
          - pip
      register: ansible_pip_upgrade
      changed_when: >-
        'successfully installed' in (ansible_pip_upgrade.stdout | lower) or
        'uninstalling ' in (ansible_pip_upgrade.stdout | lower)

    - name: Upgrade Ansible in venv
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - -u
          - "{{ ansible_binary_owner }}"
          - "{{ ansible_pip_executable }}"
          - install
          - -U
          - "{{ ansible_python_package }}"
      register: ansible_package_upgrade
      changed_when: >-
        'successfully installed' in (ansible_package_upgrade.stdout | lower) or
        'uninstalling ' in (ansible_package_upgrade.stdout | lower)

    - name: Read installed Ansible version
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - -u
          - "{{ ansible_binary_owner }}"
          - "{{ ansible_binary_path }}"
          - --version
      register: ansible_version_cmd
      changed_when: false
      check_mode: false

    - name: Output Ansible update summary
      ansible.builtin.debug:
        msg:
          - "Execution user: {{ execution_user }}"
          - "Detected ansible owner: {{ ansible_binary_owner }}"
          - "Detected ansible venv: {{ ansible_venv_path }}"
          - "{{ (ansible_version_cmd.stdout_lines | default(['ansible version unknown']))[0] }}"
