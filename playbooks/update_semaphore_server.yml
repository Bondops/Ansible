---
- name: Update Semaphore server components
  hosts: localhost
  gather_facts: true
  vars:
    update_ansible: true
    update_semaphore: true
    ansible_pipx_package: ansible
    semaphore_deb_tmp_path: /tmp/semaphore_update.deb
    semaphore_binary_path: /usr/bin/semaphore
    semaphore_ui_port: 3000
    semaphore_backup_dir: /var/backups/semaphore
    semaphore_release_api_url: https://api.github.com/repos/semaphoreui/semaphore/releases/latest

  pre_tasks:
    - name: Detect effective execution user
      ansible.builtin.command: id -un
      register: execution_user_cmd
      changed_when: false
      check_mode: false

    - name: Normalize update flags
      ansible.builtin.set_fact:
        update_ansible_enabled: "{{ update_ansible | bool }}"
        update_semaphore_enabled: "{{ update_semaphore | bool }}"
        execution_user: "{{ execution_user_cmd.stdout | trim }}"

    - name: Validate selected update actions
      ansible.builtin.assert:
        that:
          - update_ansible_enabled or update_semaphore_enabled
        fail_msg: "Enable at least one of update_ansible or update_semaphore."

    - name: Check passwordless sudo when not running as root
      ansible.builtin.command: sudo -n true
      register: sudo_check_cmd
      changed_when: false
      failed_when: false
      check_mode: false
      when: execution_user != 'root'

    - name: Require root or passwordless sudo on localhost
      ansible.builtin.assert:
        that:
          - execution_user == 'root' or sudo_check_cmd.rc == 0
        fail_msg: >-
          This update playbook requires direct root or passwordless sudo.
          Current execution user is {{ execution_user }}.

    - name: Read installed Semaphore version before update
      ansible.builtin.command:
        argv:
          - "{{ semaphore_binary_path }}"
          - version
      register: semaphore_version_before_cmd
      changed_when: false
      failed_when: false
      check_mode: false
      when: update_semaphore_enabled

    - name: Detect Semaphore service unit file path
      ansible.builtin.command: systemctl show semaphore --property=FragmentPath --value
      register: semaphore_fragment_path_cmd
      changed_when: false
      failed_when: false
      check_mode: false
      when: update_semaphore_enabled

    - name: Detect Semaphore ExecStart command
      ansible.builtin.command: systemctl show semaphore --property=ExecStart --value
      register: semaphore_execstart_cmd
      changed_when: false
      failed_when: false
      check_mode: false
      when: update_semaphore_enabled

    - name: Resolve Semaphore config and service file paths
      ansible.builtin.set_fact:
        semaphore_config_path: >-
          {{
            (semaphore_execstart_cmd.stdout | regex_search('--config[= ]([^ ;]+)', '\1') | first | default(''))
          }}
        semaphore_service_unit_path: "{{ semaphore_fragment_path_cmd.stdout | trim }}"
      when: update_semaphore_enabled

    - name: Require detectable Semaphore config path
      ansible.builtin.assert:
        that:
          - semaphore_config_path | length > 0
        fail_msg: "Could not detect Semaphore config path from systemd ExecStart."
      when: update_semaphore_enabled

    - name: Read Semaphore config JSON
      ansible.builtin.slurp:
        path: "{{ semaphore_config_path }}"
      register: semaphore_config_slurp
      become: true
      when: update_semaphore_enabled

    - name: Resolve Semaphore config data and database path
      ansible.builtin.set_fact:
        semaphore_config_json: "{{ semaphore_config_slurp.content | b64decode | from_json }}"
        semaphore_db_path: >-
          {{
            (
              (semaphore_config_slurp.content | b64decode | from_json).db
              if ((semaphore_config_slurp.content | b64decode | from_json).db is defined and ((semaphore_config_slurp.content | b64decode | from_json).db is string))
              else
              (
                (semaphore_config_slurp.content | b64decode | from_json).bolt.path
                if ((semaphore_config_slurp.content | b64decode | from_json).bolt is defined and (semaphore_config_slurp.content | b64decode | from_json).bolt.path is defined)
                else '/var/lib/semaphore/semaphore.db'
              )
            )
          }}
      when: update_semaphore_enabled

    - name: Read latest Semaphore release from GitHub
      ansible.builtin.uri:
        url: "{{ semaphore_release_api_url }}"
        method: GET
        return_content: true
        headers:
          Accept: application/vnd.github+json
          X-GitHub-Api-Version: "2022-11-28"
      register: semaphore_release_api_response
      check_mode: false
      when: update_semaphore_enabled

    - name: Resolve installed and target Semaphore versions
      ansible.builtin.set_fact:
        semaphore_installed_version: >-
          {{
            (semaphore_version_before_cmd.stdout | default('') | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+'))
            | default('')
          }}
        semaphore_target_version: >-
          {{
            (semaphore_release_api_response.json.tag_name | default('') | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+'))
            | default('')
          }}
      when: update_semaphore_enabled

    - name: Resolve target Semaphore package URL
      ansible.builtin.set_fact:
        semaphore_target_deb_url: >-
          {{
            'https://github.com/semaphoreui/semaphore/releases/download/v'
            ~ semaphore_target_version ~ '/semaphore_'
            ~ semaphore_target_version ~ '_linux_amd64.deb'
          }}
      when: update_semaphore_enabled

    - name: Ensure Semaphore backup directory exists
      ansible.builtin.file:
        path: "{{ semaphore_backup_dir }}"
        state: directory
        mode: "0750"
      become: true
      when: update_semaphore_enabled

    - name: Check Semaphore files for backup
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ semaphore_config_path }}"
        - "{{ semaphore_db_path }}"
        - "{{ semaphore_service_unit_path }}"
      register: semaphore_backup_stats
      when: update_semaphore_enabled

    - name: Backup Semaphore files before update
      ansible.builtin.copy:
        src: "{{ item.stat.path }}"
        dest: "{{ semaphore_backup_dir }}/{{ item.stat.path | basename }}.{{ ansible_date_time.iso8601_basic_short }}.bak"
        remote_src: true
        mode: preserve
      become: true
      loop: "{{ semaphore_backup_stats.results }}"
      when:
        - update_semaphore_enabled
        - item.stat.exists

    - name: Inform when requested Semaphore version is already installed
      ansible.builtin.debug:
        msg: "Semaphore {{ semaphore_installed_version }} is already installed. Package install will be skipped."
      when:
        - update_semaphore_enabled
        - semaphore_installed_version | length > 0
        - semaphore_target_version | length > 0
        - semaphore_installed_version == semaphore_target_version

  tasks:
    - name: Ensure base packages required for updates are installed
      ansible.builtin.apt:
        name:
          - ca-certificates
          - pipx
        state: present
        update_cache: true
      become: true

    - name: Discover ansible executable in PATH
      ansible.builtin.shell: command -v ansible
      args:
        executable: /bin/bash
      register: ansible_binary_path_cmd
      changed_when: false
      check_mode: false
      when: update_ansible_enabled

    - name: Fail when ansible executable is missing
      ansible.builtin.assert:
        that:
          - ansible_binary_path_cmd.rc == 0
          - ansible_binary_path_cmd.stdout | trim | length > 0
        fail_msg: >-
          ansible executable was not found in PATH on the Semaphore server.
      when: update_ansible_enabled

    - name: Detect ansible executable owner
      ansible.builtin.stat:
        path: "{{ ansible_binary_path_cmd.stdout | trim }}"
        follow: true
      register: ansible_binary_stat
      when: update_ansible_enabled

    - name: Resolve ansible and pipx locations
      ansible.builtin.set_fact:
        ansible_binary_path: "{{ ansible_binary_path_cmd.stdout | trim }}"
        ansible_binary_owner: "{{ ansible_binary_stat.stat.pw_name }}"
        ansible_pipx_executable: "{{ ((ansible_binary_path_cmd.stdout | trim) | dirname) ~ '/pipx' }}"
      when: update_ansible_enabled

    - name: Fail when pipx executable next to ansible is missing
      ansible.builtin.stat:
        path: "{{ ansible_pipx_executable }}"
      register: ansible_pipx_stat
      when: update_ansible_enabled

    - name: Require detected pipx executable
      ansible.builtin.assert:
        that:
          - ansible_pipx_stat.stat.exists
        fail_msg: "Could not find pipx next to ansible at {{ ansible_pipx_executable }}."
      when: update_ansible_enabled

    - name: Upgrade Ansible installed with pipx
      ansible.builtin.command:
        argv:
          - "{{ ansible_pipx_executable }}"
          - upgrade
          - "{{ ansible_pipx_package }}"
      become: true
      become_user: "{{ ansible_binary_owner }}"
      register: ansible_pipx_upgrade
      changed_when: >-
        'upgraded package' in (ansible_pipx_upgrade.stdout | lower) or
        'upgrading shared libraries' in (ansible_pipx_upgrade.stdout | lower)
      when: update_ansible_enabled

    - name: Download requested Semaphore release package
      ansible.builtin.get_url:
        url: "{{ semaphore_target_deb_url }}"
        dest: "{{ semaphore_deb_tmp_path }}"
        mode: "0644"
      become: true
      when:
        - update_semaphore_enabled
        - (semaphore_installed_version | default('')) != (semaphore_target_version | default(''))

    - name: Install requested Semaphore release package
      ansible.builtin.apt:
        deb: "{{ semaphore_deb_tmp_path }}"
        state: present
      register: semaphore_install
      become: true
      when:
        - update_semaphore_enabled
        - (semaphore_installed_version | default('')) != (semaphore_target_version | default(''))

    - name: Restart Semaphore service after package install
      ansible.builtin.systemd:
        name: semaphore
        state: restarted
        enabled: true
      become: true
      when:
        - update_semaphore_enabled
        - (semaphore_installed_version | default('')) != (semaphore_target_version | default(''))

    - name: Wait for Semaphore UI port to accept connections
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ semaphore_ui_port }}"
        timeout: 60
      when: update_semaphore_enabled

    - name: Read installed Ansible version
      ansible.builtin.shell: command -v ansible && ansible --version
      args:
        executable: /bin/bash
      register: ansible_version_cmd
      changed_when: false
      check_mode: false
      when: update_ansible_enabled

    - name: Read installed Semaphore version
      ansible.builtin.command:
        argv:
          - "{{ semaphore_binary_path }}"
          - version
      register: semaphore_version_cmd
      changed_when: false
      check_mode: false
      when: update_semaphore_enabled

    - name: Output update summary
      ansible.builtin.debug:
        msg:
          - "Execution user: {{ execution_user }}"
          - "Detected ansible owner: {{ ansible_binary_owner if update_ansible_enabled else 'skipped' }}"
          - "Detected Semaphore config: {{ semaphore_config_path if update_semaphore_enabled else 'skipped' }}"
          - >-
            Ansible update: {{
              (ansible_version_cmd.stdout_lines | default(['not requested']))[0]
              if update_ansible_enabled else 'skipped'
            }}
          - >-
            Semaphore update: {{
              (semaphore_version_cmd.stdout_lines | default(['not requested']))[0]
              if update_semaphore_enabled else 'skipped'
            }}
          - >-
            Semaphore target version: {{
              semaphore_target_version if update_semaphore_enabled else 'skipped'
            }}
          - >-
            Semaphore UI check: {{
              'port ' ~ (semaphore_ui_port | string) ~ ' reachable'
              if update_semaphore_enabled else 'skipped'
            }}
          - >-
            Semaphore backups: {{
              semaphore_backup_dir if update_semaphore_enabled else 'skipped'
            }}
